services:
  - type: web
    name: glc-deal-generator
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GLC_SERVICE_KEY
        sync: false
      - key: HUBSPOT_PRIVATE_APP_TOKEN
        sync: false
